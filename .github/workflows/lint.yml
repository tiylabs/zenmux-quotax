name: Format and Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: format-lint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift format and lint
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed Swift files
        id: changed-swift-files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.swift' > /tmp/changed-swift-files.txt
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}" -- '*.swift' > /tmp/changed-swift-files.txt
          else
            find Sources -name '*.swift' -type f | sort > /tmp/changed-swift-files.txt
          fi

          if [ ! -s /tmp/changed-swift-files.txt ]; then
            echo "No Swift files changed."
            echo "has_swift_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed Swift files:"
          cat /tmp/changed-swift-files.txt
          echo "has_swift_files=true" >> "$GITHUB_OUTPUT"

      - name: Check Swift formatting
        if: steps.changed-swift-files.outputs.has_swift_files == 'true'
        shell: bash
        run: |
          # Advisory for now: the repository has existing formatting debt, so this
          # step surfaces diagnostics without blocking unrelated PRs.
          while IFS= read -r file; do
            xcrun swift-format lint \
              --configuration .swift-format \
              "$file"
          done < /tmp/changed-swift-files.txt

      - name: Install SwiftLint
        if: steps.changed-swift-files.outputs.has_swift_files == 'true'
        shell: bash
        run: brew install swiftlint

      - name: Run SwiftLint
        if: steps.changed-swift-files.outputs.has_swift_files == 'true'
        shell: bash
        run: |
          # SwiftLint warnings are advisory during rollout; error-level findings fail CI.
          ci_status=0
          while IFS= read -r file; do
            swiftlint lint --config .swiftlint.yml "$file" || ci_status=$?
          done < /tmp/changed-swift-files.txt
          exit "$ci_status"
