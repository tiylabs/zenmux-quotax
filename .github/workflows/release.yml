name: Build and Upload Release Assets

on:
  push:
    tags:
      - "*"
  release:
    types: [released]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'push'
    name: Build macOS ${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: x86_64
            artifact_arch: x86_64
          - os: macos-26
            arch: arm64
            artifact_arch: aarch64

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "::error::Failed to resolve release tag from github.ref_name"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to resolve version from tag $TAG"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){0,2} ]]; then
            echo "::error::Tag must start with a numeric Apple bundle version, for example v1.2.3 or 1.2.3. Got: $TAG"
            exit 1
          fi
          BUNDLE_VERSION="${BASH_REMATCH[0]}"

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUNDLE_VERSION=$BUNDLE_VERSION" >> "$GITHUB_ENV"
          echo "Resolved release tag: $TAG"
          echo "Resolved version: $VERSION"
          echo "Resolved Apple bundle version: $BUNDLE_VERSION"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set app version from tag
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $BUNDLE_VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUNDLE_VERSION" Info.plist
          /usr/bin/plutil -lint Info.plist
          echo "Updated Info.plist to Apple bundle version $BUNDLE_VERSION"

      - name: Build app
        shell: bash
        run: |
          chmod +x scripts/build.sh
          ARCH="${{ matrix.arch }}" ./scripts/build.sh
          test -d "build/Quotax.app"
          /usr/bin/file "build/Quotax.app/Contents/MacOS/Quotax"

      - name: Import Apple signing certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Missing Apple signing secrets. Required: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_TEAM_ID."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY_LINE="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application:' | grep -F "($APPLE_TEAM_ID)" | head -n 1 || true)"
          APPLE_SIGNING_IDENTITY="$(printf '%s\n' "$IDENTITY_LINE" | awk -F '"' '{print $2}')"
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::Failed to resolve Developer ID Application signing identity for APPLE_TEAM_ID=$APPLE_TEAM_ID from the imported certificate."
            exit 1
          fi

          echo "Resolved Apple signing identity: $APPLE_SIGNING_IDENTITY"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign app
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Missing APPLE_TEAM_ID secret."
            exit 1
          fi

          codesign --force \
            --deep \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "build/Quotax.app"

          codesign --verify --deep --strict --verbose=2 "build/Quotax.app"
          codesign --display --verbose=2 "build/Quotax.app"

      - name: Package app
        shell: bash
        run: |
          mkdir -p release-artifacts

          ZIP_ARTIFACT_NAME="Quotax_${VERSION}_${{ matrix.artifact_arch }}.zip"
          ZIP_ARTIFACT_PATH="release-artifacts/$ZIP_ARTIFACT_NAME"
          rm -f "$ZIP_ARTIFACT_PATH"
          ditto -c -k --keepParent "build/Quotax.app" "$ZIP_ARTIFACT_PATH"

          DMG_ARTIFACT_NAME="Quotax_${VERSION}_${{ matrix.artifact_arch }}.dmg"
          DMG_ARTIFACT_PATH="release-artifacts/$DMG_ARTIFACT_NAME"
          DMG_STAGING_DIR="$RUNNER_TEMP/Quotax-dmg"
          rm -rf "$DMG_STAGING_DIR" "$DMG_ARTIFACT_PATH"
          mkdir -p "$DMG_STAGING_DIR"
          ditto "build/Quotax.app" "$DMG_STAGING_DIR/Quotax.app"
          ln -s /Applications "$DMG_STAGING_DIR/Applications"
          hdiutil create \
            -volname "Quotax" \
            -srcfolder "$DMG_STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_ARTIFACT_PATH"
          codesign --force \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_ARTIFACT_PATH"
          codesign --verify --verbose=2 "$DMG_ARTIFACT_PATH"

          ls -la release-artifacts
          echo "ARTIFACT_NAME=$ZIP_ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=$ZIP_ARTIFACT_PATH" >> "$GITHUB_ENV"
          echo "ZIP_ARTIFACT_NAME=$ZIP_ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "ZIP_ARTIFACT_PATH=$ZIP_ARTIFACT_PATH" >> "$GITHUB_ENV"
          echo "DMG_ARTIFACT_NAME=$DMG_ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "DMG_ARTIFACT_PATH=$DMG_ARTIFACT_PATH" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          make_latest: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit DMG notarization (async)
        shell: bash
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Missing notarization secrets. Required: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID."
            exit 1
          fi

          echo "Submitting $DMG_ARTIFACT_PATH for notarization asynchronously..."
          xcrun notarytool submit "$DMG_ARTIFACT_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Save artifacts for later use
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.artifact_arch }}
          path: release-artifacts/*
          retention-days: 30

  update-homebrew:
    if: github.event_name == 'release' && github.event.action == 'released'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "::error::Failed to resolve release tag from release event"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "Resolved release tag: $TAG"

      - name: Download macOS DMGs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_ARM="Quotax_${VERSION}_aarch64.dmg"
          DMG_X86_64="Quotax_${VERSION}_x86_64.dmg"

          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$DMG_ARM" \
            --pattern "$DMG_X86_64" \
            --dir .

          SHA256_ARM64=$(sha256sum "$DMG_ARM" | awk '{print $1}')
          SHA256_X86_64=$(sha256sum "$DMG_X86_64" | awk '{print $1}')

          echo "SHA256_ARM64=$SHA256_ARM64" >> "$GITHUB_ENV"
          echo "SHA256_X86_64=$SHA256_X86_64" >> "$GITHUB_ENV"

          echo "aarch64 sha256: $SHA256_ARM64"
          echo "x86_64 sha256: $SHA256_X86_64"

      - name: Generate Cask file
        run: |
          cat > quotax.rb << 'CASK'
          cask "quotax" do
            version "__VERSION__"

            on_arm do
              url "https://github.com/tiylabs/zenmux-quotax/releases/download/#{version}/Quotax_#{version}_aarch64.dmg"
              sha256 "__SHA256_ARM64__"
            end

            on_intel do
              url "https://github.com/tiylabs/zenmux-quotax/releases/download/#{version}/Quotax_#{version}_x86_64.dmg"
              sha256 "__SHA256_X86_64__"
            end

            name "Quotax"
            desc "Lightweight macOS menu bar monitor for ZenMux subscription quotas"
            homepage "https://github.com/tiylabs/zenmux-quotax"

            livecheck do
              url "https://github.com/tiylabs/zenmux-quotax/releases/latest"
              strategy :github_latest
            end

            auto_updates false
            depends_on macos: ">= :sequoia"

            app "Quotax.app"

            zap trash: [
              "~/Library/Application Support/com.zenmux.quotax",
              "~/Library/Caches/com.zenmux.quotax",
              "~/Library/HTTPStorages/com.zenmux.quotax",
              "~/Library/Preferences/com.zenmux.quotax.plist",
              "~/Library/Saved Application State/com.zenmux.quotax.savedState",
            ]
          end
          CASK

          sed -i \
            -e "s/__VERSION__/$VERSION/" \
            -e "s/__SHA256_ARM64__/$SHA256_ARM64/" \
            -e "s/__SHA256_X86_64__/$SHA256_X86_64/" \
            quotax.rb

          echo "Generated Cask:"
          cat quotax.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PAT_TOKEN }}
        with:
          source_file: quotax.rb
          destination_repo: tiylabs/homebrew-tap
          destination_folder: Casks
          destination_branch: master
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update Quotax to ${{ env.VERSION }}"
